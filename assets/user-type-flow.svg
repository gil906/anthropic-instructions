<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg-flow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <linearGradient id="green-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <linearGradient id="red-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <linearGradient id="purple-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <filter id="glow-g">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-r">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Animated dash for lines -->
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#22c55e"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#ef4444"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" rx="16" fill="url(#bg-flow)"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-weight="700" font-size="16" fill="#94a3b8">
    USER_TYPE Gate — Employee vs Regular Path
  </text>

  <!-- Center node: USER_TYPE check -->
  <g>
    <rect x="300" y="50" width="200" height="48" rx="24" fill="url(#purple-grad)" opacity="0.9">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="3s" repeatCount="indefinite"/>
    </rect>
    <text x="400" y="80" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-weight="700" font-size="14" fill="#fff">🔍 USER_TYPE check</text>
  </g>

  <!-- Left branch label: === 'ant' -->
  <text x="210" y="115" text-anchor="middle" font-family="monospace" font-size="12" fill="#22c55e" font-weight="700">
    === 'ant'
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
  </text>

  <!-- Right branch label: !== 'ant' -->
  <text x="590" y="115" text-anchor="middle" font-family="monospace" font-size="12" fill="#ef4444" font-weight="700">
    !== 'ant'
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
  </text>

  <!-- Animated lines from center to branches -->
  <line x1="350" y1="98" x2="210" y2="130" stroke="#22c55e" stroke-width="2.5" marker-end="url(#arrow-green)" stroke-dasharray="6,3">
    <animate attributeName="stroke-dashoffset" values="18;0" dur="1s" repeatCount="indefinite"/>
  </line>
  <line x1="450" y1="98" x2="590" y2="130" stroke="#ef4444" stroke-width="2.5" marker-end="url(#arrow-red)" stroke-dasharray="6,3">
    <animate attributeName="stroke-dashoffset" values="18;0" dur="1s" repeatCount="indefinite"/>
  </line>

  <!-- LEFT: Employee Path header -->
  <rect x="80" y="130" width="260" height="40" rx="20" fill="url(#green-grad)" filter="url(#glow-g)">
    <animate attributeName="opacity" values="0.85;1;0.85" dur="2.5s" repeatCount="indefinite"/>
  </rect>
  <text x="210" y="156" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-weight="700" font-size="14" fill="#fff">🟢 Employee Path</text>

  <!-- LEFT: Green items with staggered pulse -->
  <g>
    <rect x="80" y="185" width="260" height="36" rx="10" fill="#166534" opacity="0.7">
      <animate attributeName="opacity" values="0.5;0.8;0.5" dur="3s" begin="0s" repeatCount="indefinite"/>
    </rect>
    <text x="95" y="208" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#86efac">✅ Misconception Handling</text>
    <line x1="210" y1="170" x2="210" y2="185" stroke="#22c55e" stroke-width="1.5"/>
  </g>
  <g>
    <rect x="80" y="230" width="260" height="36" rx="10" fill="#166534" opacity="0.7">
      <animate attributeName="opacity" values="0.5;0.8;0.5" dur="3s" begin="0.5s" repeatCount="indefinite"/>
    </rect>
    <text x="95" y="253" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#86efac">✅ Faithful Reporting</text>
    <line x1="210" y1="221" x2="210" y2="230" stroke="#22c55e" stroke-width="1.5"/>
  </g>
  <g>
    <rect x="80" y="275" width="260" height="36" rx="10" fill="#166534" opacity="0.7">
      <animate attributeName="opacity" values="0.5;0.8;0.5" dur="3s" begin="1s" repeatCount="indefinite"/>
    </rect>
    <text x="95" y="298" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#86efac">✅ Verification Before Done</text>
    <line x1="210" y1="266" x2="210" y2="275" stroke="#22c55e" stroke-width="1.5"/>
  </g>
  <g>
    <rect x="80" y="320" width="260" height="36" rx="10" fill="#166534" opacity="0.7">
      <animate attributeName="opacity" values="0.5;0.8;0.5" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    </rect>
    <text x="95" y="343" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#86efac">✅ KAIROS Autonomy</text>
    <line x1="210" y1="311" x2="210" y2="320" stroke="#22c55e" stroke-width="1.5"/>
  </g>

  <!-- RIGHT: Regular Path header -->
  <rect x="460" y="130" width="260" height="40" rx="20" fill="url(#red-grad)" filter="url(#glow-r)">
    <animate attributeName="opacity" values="0.85;1;0.85" dur="2.5s" repeatCount="indefinite"/>
  </rect>
  <text x="590" y="156" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-weight="700" font-size="14" fill="#fff">🔴 Regular Path</text>

  <!-- RIGHT: Red items with staggered pulse -->
  <g>
    <rect x="460" y="185" width="260" height="36" rx="10" fill="#7f1d1d" opacity="0.7">
      <animate attributeName="opacity" values="0.5;0.8;0.5" dur="3s" begin="0s" repeatCount="indefinite"/>
    </rect>
    <text x="475" y="208" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#fca5a5">❌ Softer hedging</text>
    <line x1="590" y1="170" x2="590" y2="185" stroke="#ef4444" stroke-width="1.5"/>
  </g>
  <g>
    <rect x="460" y="230" width="260" height="36" rx="10" fill="#7f1d1d" opacity="0.7">
      <animate attributeName="opacity" values="0.5;0.8;0.5" dur="3s" begin="0.5s" repeatCount="indefinite"/>
    </rect>
    <text x="475" y="253" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#fca5a5">❌ May fake success</text>
    <line x1="590" y1="221" x2="590" y2="230" stroke="#ef4444" stroke-width="1.5"/>
  </g>
  <g>
    <rect x="460" y="275" width="260" height="36" rx="10" fill="#7f1d1d" opacity="0.7">
      <animate attributeName="opacity" values="0.5;0.8;0.5" dur="3s" begin="1s" repeatCount="indefinite"/>
    </rect>
    <text x="475" y="298" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#fca5a5">❌ Skips verification</text>
    <line x1="590" y1="266" x2="590" y2="275" stroke="#ef4444" stroke-width="1.5"/>
  </g>
  <g>
    <rect x="460" y="320" width="260" height="36" rx="10" fill="#7f1d1d" opacity="0.7">
      <animate attributeName="opacity" values="0.5;0.8;0.5" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    </rect>
    <text x="475" y="343" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#fca5a5">❌ Asks user to test</text>
    <line x1="590" y1="311" x2="590" y2="320" stroke="#ef4444" stroke-width="1.5"/>
  </g>

  <!-- Bottom badge -->
  <rect x="280" y="370" width="240" height="24" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="400" y="387" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#94a3b8">
    This repo unlocks the 🟢 path for everyone
    <animate attributeName="fill" values="#94a3b8;#22c55e;#94a3b8" dur="4s" repeatCount="indefinite"/>
  </text>
</svg>
