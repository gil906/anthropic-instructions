<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0a1a"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
    <linearGradient id="cmdGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1">
        <animate attributeName="stop-color" values="#6366f1;#8b5cf6;#6366f1" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#8b5cf6">
        <animate attributeName="stop-color" values="#8b5cf6;#a78bfa;#8b5cf6" dur="3s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="claudeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="aiderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <linearGradient id="doneGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b">
        <animate attributeName="stop-color" values="#f59e0b;#fbbf24;#f59e0b" dur="2s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#fbbf24">
        <animate attributeName="stop-color" values="#fbbf24;#fde68a;#fbbf24" dur="2s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bgGrad)" rx="16"/>

  <!-- Floating particles -->
  <circle cx="100" cy="50" r="1.5" fill="#6366f1" opacity="0.4">
    <animate attributeName="cy" values="50;30;50" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="700" cy="350" r="1" fill="#22c55e" opacity="0.3">
    <animate attributeName="cy" values="350;330;350" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="380" r="2" fill="#fbbf24" opacity="0.3">
    <animate attributeName="cy" values="380;360;380" dur="3.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Connection lines (animated) -->
  <!-- cmd -> Claude Code -->
  <line x1="400" y1="90" x2="280" y2="150" stroke="#7c3aed" stroke-width="2" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite"/>
  </line>
  <!-- cmd -> Aider -->
  <line x1="400" y1="90" x2="520" y2="150" stroke="#22c55e" stroke-width="2" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite" begin="0.3s"/>
  </line>
  <!-- Claude -> config -->
  <line x1="280" y1="190" x2="280" y2="240" stroke="#a78bfa" stroke-width="2" stroke-dasharray="6 3" opacity="0.5">
    <animate attributeName="stroke-dashoffset" values="0;-18" dur="1.5s" repeatCount="indefinite"/>
  </line>
  <!-- Aider -> config -->
  <line x1="520" y1="190" x2="520" y2="240" stroke="#4ade80" stroke-width="2" stroke-dasharray="6 3" opacity="0.5">
    <animate attributeName="stroke-dashoffset" values="0;-18" dur="1.5s" repeatCount="indefinite"/>
  </line>
  <!-- config -> done -->
  <line x1="280" y1="280" x2="400" y2="330" stroke="#fbbf24" stroke-width="2" opacity="0.5">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2.5s" repeatCount="indefinite"/>
  </line>
  <line x1="520" y1="280" x2="400" y2="330" stroke="#fbbf24" stroke-width="2" opacity="0.5">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2.5s" repeatCount="indefinite" begin="0.5s"/>
  </line>

  <!-- Command node (top center) -->
  <rect x="280" y="40" width="240" height="50" rx="25" fill="url(#cmdGrad)" filter="url(#glow)">
    <animate attributeName="rx" values="25;28;25" dur="3s" repeatCount="indefinite"/>
  </rect>
  <text x="400" y="71" text-anchor="middle" fill="white" font-family="monospace" font-size="15" font-weight="bold">🖥️ bash setup-global.sh</text>

  <!-- Claude Code node -->
  <rect x="180" y="150" width="200" height="40" rx="12" fill="url(#claudeGrad)" opacity="0.9">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite" begin="0.5s"/>
  </rect>
  <text x="280" y="175" text-anchor="middle" fill="white" font-family="sans-serif" font-size="14" font-weight="bold">🟣 Claude Code</text>

  <!-- Aider node -->
  <rect x="420" y="150" width="200" height="40" rx="12" fill="url(#aiderGrad)" opacity="0.9">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite" begin="0.8s"/>
  </rect>
  <text x="520" y="175" text-anchor="middle" fill="white" font-family="sans-serif" font-size="14" font-weight="bold">🟢 Aider</text>

  <!-- Config path nodes -->
  <rect x="160" y="245" width="240" height="30" rx="8" fill="#2d1b69" stroke="#7c3aed" stroke-width="1" opacity="0.8">
    <animate attributeName="opacity" values="0.6;0.9;0.6" dur="4s" repeatCount="indefinite"/>
  </rect>
  <text x="280" y="265" text-anchor="middle" fill="#c4b5fd" font-family="monospace" font-size="12">~/.claude/CLAUDE.md</text>

  <rect x="400" y="245" width="240" height="30" rx="8" fill="#0a3d1f" stroke="#22c55e" stroke-width="1" opacity="0.8">
    <animate attributeName="opacity" values="0.6;0.9;0.6" dur="4s" repeatCount="indefinite" begin="0.5s"/>
  </rect>
  <text x="520" y="265" text-anchor="middle" fill="#bbf7d0" font-family="monospace" font-size="12">~/.aider.conf.yml</text>

  <!-- Done node (bottom center) -->
  <rect x="240" y="325" width="320" height="50" rx="25" fill="url(#doneGrad)" filter="url(#glowStrong)">
    <animate attributeName="rx" values="25;30;25" dur="2.5s" repeatCount="indefinite"/>
  </rect>
  <text x="400" y="350" text-anchor="middle" fill="#1e1b4b" font-family="sans-serif" font-size="13" font-weight="bold">
    ✅ ALL projects use rules automatically
  </text>
  <text x="400" y="366" text-anchor="middle" fill="#1e1b4b" font-family="sans-serif" font-size="11" opacity="0.7">No per-project setup needed</text>

  <!-- Animated pulse rings on Done node -->
  <rect x="240" y="325" width="320" height="50" rx="25" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0">
    <animate attributeName="opacity" values="0.6;0" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="x" values="240;220" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="y" values="325;315" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="width" values="320;360" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="height" values="50;70" dur="2s" repeatCount="indefinite"/>
  </rect>
</svg>