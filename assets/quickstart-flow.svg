<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" viewBox="0 0 800 300">
  <defs>
    <linearGradient id="bg-qs" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <marker id="qs-arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#a78bfa"/>
    </marker>
    <marker id="qs-arr-g" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#22c55e"/>
    </marker>
    <filter id="qs-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="300" rx="16" fill="url(#bg-qs)"/>

  <text x="400" y="30" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-weight="700" font-size="16" fill="#94a3b8">
    🚀 Quick Start — Choose Your Setup
  </text>

  <!-- Start node -->
  <rect x="310" y="45" width="180" height="42" rx="21" fill="#6366f1" filter="url(#qs-glow)">
    <animate attributeName="opacity" values="0.85;1;0.85" dur="2.5s" repeatCount="indefinite"/>
  </rect>
  <text x="400" y="71" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-weight="700" font-size="13" fill="#fff">🚀 Choose your setup</text>

  <!-- Decision: Want it everywhere? -->
  <rect x="310" y="110" width="180" height="42" rx="10" fill="#fbbf24" stroke="#f59e0b" stroke-width="2">
    <animate attributeName="stroke-width" values="2;3;2" dur="2s" repeatCount="indefinite"/>
  </rect>
  <text x="400" y="136" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-weight="700" font-size="12" fill="#1e1b4b">Want it everywhere?</text>

  <!-- Line: Start → Decision -->
  <line x1="400" y1="87" x2="400" y2="110" stroke="#a78bfa" stroke-width="2" marker-end="url(#qs-arr)" stroke-dasharray="5,3">
    <animate attributeName="stroke-dashoffset" values="16;0" dur="0.8s" repeatCount="indefinite"/>
  </line>

  <!-- LEFT: Yes → setup-global.sh -->
  <rect x="60" y="170" width="210" height="42" rx="21" fill="#22c55e">
    <animate attributeName="opacity" values="0.85;1;0.85" dur="2.5s" begin="0.3s" repeatCount="indefinite"/>
  </rect>
  <text x="165" y="196" text-anchor="middle" font-family="monospace" font-weight="700" font-size="12" fill="#fff">bash setup-global.sh</text>
  <text x="190" y="160" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#22c55e" font-weight="700">✅ Yes</text>
  <line x1="310" y1="140" x2="270" y2="170" stroke="#22c55e" stroke-width="2.5" marker-end="url(#qs-arr-g)" stroke-dasharray="5,3">
    <animate attributeName="stroke-dashoffset" values="16;0" dur="0.8s" repeatCount="indefinite"/>
  </line>

  <!-- RIGHT: Per-project decision -->
  <rect x="540" y="170" width="200" height="42" rx="10" fill="#fbbf24" stroke="#f59e0b" stroke-width="2">
    <animate attributeName="stroke-width" values="2;3;2" dur="2s" begin="0.5s" repeatCount="indefinite"/>
  </rect>
  <text x="640" y="196" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-weight="700" font-size="12" fill="#1e1b4b">Which tools?</text>
  <text x="570" y="160" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#f59e0b" font-weight="700">📁 Per-project</text>
  <line x1="490" y1="140" x2="540" y2="175" stroke="#f59e0b" stroke-width="2" marker-end="url(#qs-arr)" stroke-dasharray="5,3">
    <animate attributeName="stroke-dashoffset" values="16;0" dur="0.8s" repeatCount="indefinite"/>
  </line>

  <!-- RIGHT-LEFT: All → setup.sh -->
  <rect x="470" y="240" width="150" height="38" rx="19" fill="#22c55e">
    <animate attributeName="opacity" values="0.85;1;0.85" dur="2.5s" begin="0.6s" repeatCount="indefinite"/>
  </rect>
  <text x="545" y="264" text-anchor="middle" font-family="monospace" font-weight="700" font-size="12" fill="#fff">bash setup.sh</text>
  <text x="500" y="230" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#22c55e" font-weight="700">🔥 All</text>
  <line x1="595" y1="212" x2="560" y2="240" stroke="#22c55e" stroke-width="2" marker-end="url(#qs-arr-g)" stroke-dasharray="5,3">
    <animate attributeName="stroke-dashoffset" values="16;0" dur="0.8s" repeatCount="indefinite"/>
  </line>

  <!-- RIGHT-RIGHT: Just one → copy file -->
  <rect x="660" y="240" width="130" height="38" rx="19" fill="#22c55e">
    <animate attributeName="opacity" values="0.85;1;0.85" dur="2.5s" begin="0.9s" repeatCount="indefinite"/>
  </rect>
  <text x="725" y="264" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-weight="700" font-size="12" fill="#fff">Copy the file</text>
  <text x="720" y="230" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#22c55e" font-weight="700">🎯 One</text>
  <line x1="690" y1="212" x2="710" y2="240" stroke="#22c55e" stroke-width="2" marker-end="url(#qs-arr-g)" stroke-dasharray="5,3">
    <animate attributeName="stroke-dashoffset" values="16;0" dur="0.8s" repeatCount="indefinite"/>
  </line>

  <!-- LEFT result -->
  <rect x="60" y="240" width="210" height="32" rx="16" fill="#10b981" filter="url(#qs-glow)">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
  </rect>
  <text x="165" y="261" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-weight="700" font-size="12" fill="#fff">🏆 Works in ALL projects</text>
  <line x1="165" y1="212" x2="165" y2="240" stroke="#22c55e" stroke-width="2" marker-end="url(#qs-arr-g)" stroke-dasharray="5,3">
    <animate attributeName="stroke-dashoffset" values="16;0" dur="0.8s" repeatCount="indefinite"/>
  </line>
</svg>
